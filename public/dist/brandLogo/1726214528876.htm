#picture__input {

.picture {
  width: 300px;
  aspect-ratio: 6/2;
  background: #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #aaa;
  border: 1px solid currentcolor;
  cursor: pointer;
  font-family: sans-serif;
  transition: color 300ms ease-in-out, background 300ms ease-in-out;
  outline: none;
  overflow: hidden;
}

.picture:hover {
  color: #777;
  background: #ccc;
}

.picture:active {
  border-color: turquoise;
  color: turquoise;
  background: #eee;
}

.picture:focus {
  color: #777;
  background: #ccc;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
}

.picture__img {
  max-width: 100%;
}

<script>
    var orderTable = "";
    var host = window.location.origin;
    // $(document).ready(function () {
    orderTable = $('#brandTable').DataTable({
        "oLanguage": {
            "sSearch": "Search"
        },
        // "orderable": false,
        "processing": true,
        "serverSide": true,
        "ordering": false,
        "autoWidth": false,
        "pagination": true,
        "pageLength": 10,
        "scrollX": true,
        // "scrollY": 230,
        "ajax": {
            "url": "/backend/getBrand",
        },
        "columns": [
            {
                "data": "No",
                render: function (data, type, full, meta) {
                    return meta.row + 1;
                }
            },
            {
                "data": "brandLogo",
                render: function (data, type, row) {
                    console.log("row---", row);

                        return '<img src="' + row.brandLogo + '" alt="Brand Logo" width="50" height="50">';
                   
                }
            },

            {
                "data": "brandName",
                render: function (data, type, row) {
                    if (row.brandName != undefined) {
                        return row.brandName;
                    } else {
                        return "-";
                    }
                }
            },
            {
                "data": "coupons",
                render: function (data, type, row) {
                    // console.log("row.coupon------", row.coupons.length);
                    if (row.coupons.length) {
                        return row.coupons.length;
                    } else {
                        return 0;
                    }
                }
            },
            {
                "data": "status",
                render: function (data, type, row) {
                    if (row.status !== undefined) {
                        if (row.status === "active") {
                            return '<span style="color: green;">Active</span>';
                        } else {
                            return '<span style="color: red;">InActive</span>';
                        }
                    } else {
                        return '<span style="color: red;">InActive</span>';  // Default to red for undefined or any other status
                    }
                }
            },

            {
                "data": "action",
                render: function (data, type, row) {

                    // console.log("row", row.id);
                    return `
                        <a href="/backend/brandDetail/${row.id}" title="View Brand" name="view" id="${row.id}" class="btn btn-primary btn-xs btn-rounded view"> <i class="fa fa-eye" aria-hidden="true"></i></a>
                        <a href="/backend/editBrand/${row.id}" title="Edit Brand" name="edit" id="${row.id}" class="btn btn-warning btn-xs btn-rounded edit"><i class="far fa-edit"></i></a>
                        <a href="/backend/deleteBrand/${row.id}" title="Delete Brand" name="delete" id="${row.id}" class="btn btn-danger btn-xs btn-rounded delete" onclick="deletePlayer(${row.id})"><i class="fa fa-trash" aria-hidden="true"></i></a>`;
                }
            }
        ]

    });
    $(document).ready(function () {
        $(document).ready(function () {
            //block & unblock
            $('body').on('click', '.playerActive', function (e) {
                var id = $(this).attr('id');
                console.log("id -->", id);
                var name = $(this).attr('name');
                console.log("name--->>", name);

                if (name == "active") {
                    name = "Block"
                } else {
                    name = "Unblock"
                }
                console.log("name---", name);
                var thisElement = this;
                Swal.fire({
                    title: "Are you sure?",
                    text: "Do you want to " + name + " the User?",
                    // type: "warning",
                    showCancelButton: true,
                    confirmButtonColor: "#e69a2a",
                    confirmButtonText: "Yes, " + name + " it!",
                    cancelButtonText: "No, cancel pls!",
                    // closeOnConfirm: false,
                    // closeOnCancel: false
                }).then((result) => {
                    console.log("result --> ", result);
                    console.log("result.isConfirm", result.isConfirmed);

                    if (result.isConfirmed) {
                        console.log("true");
                        $.ajax({
                            type: 'POST',
                            url: host + "/backend/user/blockUnblockUser",
                            data: {
                                id: id
                            },
                            success: function (resultData) {
                                console.log("winning result", resultData);
                                if (resultData == 'success') {
                                    let changeText = 'Active';
                                    if ($(thisElement).parent().parent().find('td  .playerActive').hasClass("btn-success")) {
                                        changeText = 'inactive';
                                        $(thisElement).parent().parent().find('td  .playerActive').removeClass("btn-success");
                                        $(thisElement).parent().parent().find('td  .playerActive').addClass("btn-danger");
                                        $('#status-' + id).css({ color: "red" });
                                    } else {
                                        $(thisElement).parent().parent().find('td  .playerActive').removeClass("btn-danger");
                                        $(thisElement).parent().parent().find('td  .playerActive').addClass("btn-success");
                                        $('#status-' + id).css({ color: "green" });
                                    }
                                    $('#status-' + id).html(changeText);
                                    location.reload()

                                } else {
                                    console.log("Something went wrong");
                                    alert("Something went wrong")
                                }

                            }
                        });
                    }

                });


                return false;
            });
        });
    });
