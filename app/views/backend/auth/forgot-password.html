<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ siteName }}</title>
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <meta name="author" content="{{ App.name }}" />
    <!-- Tell the browser to be responsive to screen width -->
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <!-- Favicon -->
    <link rel="shortcut icon" href="/dist/img/logo.png">
    <link rel="icon" href="/dist/img/logo.png" type="image/x-icon">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css" />
    <!-- Theme style -->
    <link rel="stylesheet" href="/dist/css/adminlte.min.css">
    <!-- style css -->
    <link rel="stylesheet" href="/stylesheet/forget.css" />
    <!-- iCheck -->
    <link rel="stylesheet" href="/plugins/icheck-bootstrap/icheck-bootstrap.min.css" />
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback" />
</head>

<body>
    <div class="login-panel">
        {% if error.length > 0 %}
        <div class="alert alert-danger notifications">
            {{ error }}
        </div>
        {% endif %}

        {% if success.length > 0 %}
        <div class="alert alert-success notifications">
            {{ success }}
        </div>
        {% endif %}
        <!-- Password Reset 1 - Bootstrap Brain Component -->
        <div class="form-gap"></div>
        <center><img class="logo_img" src="/dist/img/logo.png" alt="brand"
                style="width: 115px;margin-bottom: 10px;" /></center>
        <h4 class="text-center pb-2">Forgot Password</h4>
        <p class="text-center">
            Enter your account email address to receive a link allowing you to
            create a new password
        </p>
        <form id="register-form" role="form" autocomplete="off" class="form" method="post" action="/login/forgetpassword">
            <div class="col-12">
                <div class="input-group mb-3">
                    <input type="email" class="form-control pr-5" placeholder="Enter email" name="email" required
                        data-validation="email" id="email" />
                    <div class="input-group-append">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <!-- Added -->
                <input class="btn w-100 btn-primary" value="Request new password" type="submit" />
            </div><br>
            <a href="/backend" class="d-block text-center" style="text-decoration: underline;">Back to Login</a>
        </form>
    </div>
    <!-- jQuery -->
    <script src="/plugins/jquery/jquery.min.js"></script>
    <!-- jQuery UI 1.11.4 -->
    <script src="/plugins/jquery-ui/jquery-ui.min.js"></script>
    <script>
        $(document).ready(function () {
            $('#resend-link').click(function () {
                console.log('resend link clicked');
                var obj = {
                    email: $('#email').val()
                }
                $.post('/forgotPassword?type=resend', obj, function (err, resp, body) {
                    console.log('body: ', body.responseText);
                    window.location = body.responseText;
                });
            });
            $(function () {
                $('input').iCheck({
                    checkboxClass: 'icheckbox_square-blue',
                    radioClass: 'iradio_square-blue',
                    increaseArea: '20%' /* optional */
                });
                $.validate({
                    modules: 'location, date, security, file',
                });
            });
        });
        setTimeout(function () {
            $('.notifications').slideUp('slow');
            var cells = $('.notifications');
            setTimeout(function () {
                cells.remove();
            }, 1000);
        }, 5000);
    </script>
</body>

</html>
