<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ siteName }}</title>
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <meta name="author" content="{{ App.name }}" />
    <!-- Tell the browser to be responsive to screen width -->
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <!-- Favicon -->
    <link rel="shortcut icon" href="/dist/img/logo.png">
    <link rel="icon" href="/dist/img/logo.png" type="image/x-icon">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css" />
    <!-- Ionicons -->
    <link rel="stylesheet" href="/others/ionicons.min.css" />
    <!-- Theme style -->
    <link rel="stylesheet" href="/dist/css/adminlte.min.css">
    <!-- style css -->
    <link rel="stylesheet" href="/stylesheet/login.css" />
    <!-- iCheck -->
    <link rel="stylesheet" href="/plugins/icheck-bootstrap/icheck-bootstrap.min.css" />
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback" />
</head>

<body>
    <div class="container-fluid">
        <div class="row d-flex justify-content-center align-items-center m-0" style="height: 100vh">
            <div class="login_outer">
                {% if error.length > 0 %}
                <div class="alert alert-danger notifications">{{ error }}</div>
                {% endif %} {% if success.length > 0 %}
                <div class="alert alert-success notifications">{{ success }}</div>
                {% endif %}

                <form action="/login/check" method="post" id="login" autocomplete="off" class="bg-light border p-4">
                    <div class="col-md-12 logo_outer">
                        <img class="logo_img" src="/dist/img/logo.png" alt="brand" style="width: 115px;" />
                        <!-- <img src="/backend/images/logo.png" class="logo_img" /> -->
                        <!-- Added class for image size -->
                    </div>
                    <div class="form-row">
                        <h4 class="title my-1 w-100 justify-content-center text-center">
                            Sign In
                        </h4>
                        <div class="col-12">
                            <div class="input-group mb-3">
                                <input type="email" class="form-control pr-5" placeholder="Enter email" name="email" required
                                    data-validation="email" id="email" />
                                <div class="input-group-append">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                </div>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="input-group">
                                <input name="password" type="password" value="" class="form-control pr-5" id="password"
                                    placeholder="Enter password" required="true" required data-minlength="6"
                                    data-validation="length" data-validation-length="min6" />
                                <span class="input-group-append">
                                    <button class="btn" type="button" id="togglePassword">
                                        <i id="eye_icon" class="fas fa-eye"></i>
                                    </button>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-12 pt-3 text-right remember-me">
                        <!-- Added class for spacing -->
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="form-group form-check text-left mb-0">
                                <input type="checkbox" class="form-check-input" id="remember_me" />
                                <label class="form-check-label" for="remember_me">Remember me</label>
                            </div>
                            <p class="mb-0">
                                <a href="/login/forget" style="text-decoration: underline;">Forgot Password?</a>
                            </p>
                        </div>
                    </div>

                    <div class="col-12">
                        <button class="btn btn-primary btn-block" type="submit">
                            Sign In
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- jQuery -->
    <script src="/plugins/jquery/jquery.min.js"></script>
    <!-- jQuery UI 1.11.4 -->
    <script src="/plugins/jquery-ui/jquery-ui.min.js"></script>
    <script>
        $(document).ready(function () {
            // Function to toggle password visibility
            $("#togglePassword").click(function () {
                var passwordField = $("#password");
                var passwordFieldType = passwordField.attr("type");
                var eyeIcon = $("#eye_icon");

                if (passwordFieldType === "password") {
                    passwordField.attr("type", "text");
                    eyeIcon.removeClass("fa-eye").addClass("fa-eye-slash");
                } else {
                    passwordField.attr("type", "password");
                    eyeIcon.removeClass("fa-eye-slash").addClass("fa-eye");
                }
            });
        });

        $(document).ready(function () {
            // Check if "Remember me" is checked and populate email and password if they are saved
            if (localStorage.getItem("remember") === "true") {
                $("#email").val(localStorage.getItem("email"));
                $("#password").val(localStorage.getItem("password"));
                $("#remember_me").prop("checked", true);
            }

            // Handle checkbox change event
            $("#remember_me").change(function () {
                if (this.checked) {
                    // If checked, save email and password to localStorage
                    localStorage.setItem("remember", true);
                    localStorage.setItem("email", $("#email").val());
                    localStorage.setItem("password", $("#password").val());
                } else {
                    // If unchecked, remove saved email and password from localStorage
                    localStorage.removeItem("remember");
                    localStorage.removeItem("email");
                    localStorage.removeItem("password");
                }
            });
        });

        setTimeout(function () {
            $('.notifications').slideUp('slow');
            var cells = $('.notifications');
            setTimeout(function () {
                cells.remove();
            }, 1000);
        }, 5000);

    </script>
</body>

</html>
