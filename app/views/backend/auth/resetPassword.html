<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ App.name }}</title>
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <meta name="author" content="{{ App.name }}" />
    <!-- Tell the browser to be responsive to screen width -->
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <!-- Favicon -->
    <link rel="shortcut icon" href="/dist/img/logo.png">
    <link rel="icon" href="/dist/img/logo.png" type="image/x-icon">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css" />
    <!-- Ionicons -->
    <link rel="stylesheet" href="/others/ionicons.min.css" />
    <!-- Theme style -->
    <link rel="stylesheet" href="/dist/css/adminlte.min.css">
    <!-- style css -->
    <link rel="stylesheet" href="/stylesheet/login.css" />
    <!-- iCheck -->
    <link rel="stylesheet" href="/plugins/icheck-bootstrap/icheck-bootstrap.min.css" />
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback" />
</head>

<body>
    <div class="container-fluid">
        <div class="row d-flex justify-content-center align-items-center m-0" style="height: 100vh">
            <div class="login_outer">
                {% if error.length > 0 %}
                <div class="alert alert-danger notifications">{{ error }}</div>
                {% endif %} {% if success.length > 0 %}
                <div class="alert alert-success notifications">{{ success }}</div>
                {% endif %}

                <form action="/resetPassword" method="post" id="login" autocomplete="off" class="bg-light border p-4">
                    <div class="col-md-12 logo_outer">
                        <img class="logo_img" src="/dist/img/logo.png" alt="brand" style="width: 115px;" />
                        <!-- <img src="/backend/images/logo.png" class="logo_img" /> -->
                        <!-- Added class for image size -->
                    </div>
                    <div class="form-row">
                        <h4 class="title my-2 w-100 justify-content-center text-center">
                            Reset Password
                        </h4>
                        <input type="hidden" name="id" value="{{id}}">
                        <div class="col-12 mb-3">
                            <div class="inputField">
                                <input type="password" class="form-control" id="password" name="newPassword"
                                    data-minlength="6" data-validation="length" data-validation-length="min6"
                                    placeholder="New Password">
                                <span class="input-group-append">
                                    <button class="btn" type="button" id="togglePassword">
                                        <i id="ps" class="fa fa-eye" onclick="myFunction('ps')"></i>
                                    </button>
                                </span>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="inputField">
                                <input type="password" class="form-control" id="pass_confirmation"
                                    name="pass_confirmation" data-minlength="6" data-validation="confirmation"
                                    data-validation-length="min6" placeholder="Confirm Password">
                                <span class="input-group-append">
                                    <button class="btn" type="button" id="togglePassword">
                                        <i id="nps" class="fa fa-eye" onclick="myFunction('nps')"></i>
                                    </button>
                                </span>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" class="hide" name="token" id="token" value="">
                    <div class="col-12 mt-4">
                        <input name="recover-submit" class="btn btn-primary btn-block col-md-12 text-center"
                            value="Change password" type="submit">
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- jQuery -->
    <script src="/plugins/jquery/jquery.min.js"></script>
    <!-- jQuery UI 1.11.4 -->
    <script src="/plugins/jquery-ui/jquery-ui.min.js"></script>
    <!-- Form validator -->
    <script src="/others/jquery.validate.min.js"></script>
    <script>
        function myFunction(el) {
            let fl = (el == 'ps') ? 'password' : 'pass_confirmation';
            // let fl;
            // if (el == 'ops') {
            //   fl = 'opassword'
            // } else if (el == 'ps') {
            //   fl = 'npassword'
            // } else {
            //   fl = 'cpassword'
            // }
            console.log("fl ---", fl);
            var x = document.getElementById(fl);
            console.log("x--", x);
            var icon = document.getElementById(el);
            if (x.type === "password") {
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
                x.type = "text";
            } else {
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
                x.type = "password";
            }
        }
        $(document).ready(function () {

            // $(function () {
            //     $.validate({
            //         modules: 'security',
            //         onModulesLoaded: function () {
            //             // Show strength of password
            //             $('input[name="pass_confirmation"]').displayPasswordStrength();
            //         }
            //     });
            // });



            $("#reset-password").validate({
                rules: {
                    newPassword: {
                        required: true,
                        rangelength: [6, 20],
                    },
                    pass_confirmation: {
                        required: true,
                        rangelength: [6, 20],
                        equalTo: "#password",
                    },
                    oldPassword: {
                        required: true,
                        rangelength: [6, 20],
                    },
                },
                messages: {
                    newPassword: {
                        required: "Please enter new password",
                        rangelength: "New password length should be between 6 to 20 characters",
                    },
                    pass_confirmation: {
                        required: "Please enter confirm password",
                        equalTo: "Confirm password not matched with new password",
                        rangelength:
                            "Confirm password length should be between 6 to 20 characters",
                    },
                }
            })
        })
    </script>
</body>

</html>
